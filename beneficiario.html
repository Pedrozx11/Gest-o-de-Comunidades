<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beneficiario</title>
    <link rel="stylesheet" href="beneficiario.css" />
</head>
<body>
    <h1>Registro</h1>
    <form class="registro">
        <fieldset>
            <legend>Informações Básicas</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="João Paulo" required />
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="anyone@email.com" required />
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="12" max="99" placeholder="18" required />
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(83) 99999-9999" required />
        </fieldset>
        <fieldset>
            <legend>Gênero</legend>
            <input type="radio" id="macho" name="genero" value="macho" />
            <label for="macho">Masculino</label>
            <input type="radio" id="femea" name="genero" value="femea" />
            <label for="femea">Feminino</label>
            <input type="radio" id="outro" name="genero" value="outro" />
            <label for="outro">Outro</label>
        </fieldset>
        <fieldset>
            <button type="submit">Registrar como Beneficiario</button>
        </fieldset>
    </form>
</body>
</html>
